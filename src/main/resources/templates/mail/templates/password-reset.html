<html xmlns:th="http://www.thymeleaf.org" th:replace="~{mail/layouts/base :: layout(~{::section})}">
<section>
    <p>Hi <strong th:text="${username}">[username]</strong>,</p>
    <p>We've received a request to reset your password.</p>
    <p>Click the link below to reset your password:</p>
    <a th:href="${resetLink}" th:text="${resetLink}">[Link here]</a>
    <p>If this was mistake, just ignore this email and nothing will happen.</p>
</section>
</html>
